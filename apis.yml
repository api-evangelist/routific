description: Routific is a Vancouver-based delivery management and route optimization software provider. Its
  platform combines smart route optimization, dispatch and live tracking, a driver mobile app, customer
  delivery notifications with real-time tracking, and proof of delivery. The standalone Route Optimization
  API exposes the same engine — solving Vehicle Routing Problems (VRP) and Pickup-and-Delivery Problems
  (PDP) — to SaaS integrators and channel partners. Routific has optimized over 191 million deliveries for
  more than 1,000 businesses since founding.
