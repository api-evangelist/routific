  description: Routific's Route Optimization API solves the Vehicle Routing Problem (VRP) and Pickup-and-Delivery
    Problem (PDP) for last-mile delivery fleets. It supports time-windows, capacity constraints, multi-depot
    fleets, driver shifts, balanced routes, traffic simulation, polyline output, toll avoidance, and Google or
    Here geocoding. Synchronous /v1/vrp handles small problems; asynchronous /v1/vrp-long and /v1/pdp-long
    process up to 2,500 visits per call via a job_id polling pattern. /v1/fix and /v1/fix-pdp insert new
    visits into existing solutions without re-solving.
