apiCommonsPlans: 0.1
info:
  title: Routific Plans And Pricing
  description: Routific's commercial offering for delivery management and the Route Optimization API. Pricing model migrated to per-order in mid-2024. Free tier covers 100 orders/month and includes all platform features except SMS notifications.
  provider: Routific
  url: https://routific.com/pricing
  modified: '2026-05-25'
plans:
- id: free
  name: Free
  description: Up to 100 orders/month at no cost. All platform features included except SMS notifications.
  currency: USD
  pricing:
  - unit: order
    included: 100
    price: 0
    timeFrame: month
  features:
  - name: Unlimited drivers and dispatchers
  - name: Intelligent route optimization
  - name: Driver mobile apps
  - name: Real-time GPS tracking
  - name: Customer email notifications
  - name: Delivery Tracker
  - name: Proof of Delivery
  - name: View-only support dashboard
- id: paid
  name: Paid (Volume Tiered)
  description: Volume-tiered per-order pricing. $150 flat fee covers 101-1,000 orders/month, with declining per-order rates above 1,000.
  currency: USD
  pricing:
  - unit: month
    description: Flat fee covering 101-1,000 orders
    price: 150
    timeFrame: month
  - unit: order
    description: 1,001-2,000 additional orders
    price: 0.15
    timeFrame: month
  - unit: order
    description: 2,001-3,000 additional orders
    price: 0.13
    timeFrame: month
  - unit: order
    description: 3,001-5,000 additional orders
    price: 0.10
    timeFrame: month
  - unit: order
    description: 5,001-10,000 additional orders
    price: 0.08
    timeFrame: month
  - unit: order
    description: 10,001-20,000 additional orders
    price: 0.05
    timeFrame: month
  - unit: order
    description: 20,001-50,000 additional orders
    price: 0.03
    timeFrame: month
  features:
  - name: All Free features
  - name: SMS notifications (paid add-on; pricing varies by region)
- id: enterprise
  name: Enterprise / Custom
  description: 50,000+ orders/month — custom pricing. Contact sales for channel partner / API embedded integrations.
  currency: USD
  pricing:
  - unit: order
    description: Custom volume pricing above 50,000 orders/month
    price: contact-sales
    timeFrame: month
  features:
  - name: All Paid features
  - name: Channel partner / Route Optimization API integration
- id: api
  name: Route Optimization API
  description: Standalone Route Optimization API for developers and SaaS integrators. Bearer JWT tokens. Per-account daily request limits with a path to request an increase via support@routific.com.
  currency: USD
  pricing:
  - unit: request
    description: Custom volume pricing — contact support@routific.com.
    price: contact-sales
  features:
  - name: Synchronous /v1/vrp endpoint
  - name: Asynchronous /v1/vrp-long endpoint (up to 2,500 visits)
  - name: Asynchronous /v1/pdp-long endpoint
  - name: /v1/fix and /v1/fix-pdp solution-insertion endpoints
  - name: Polylines and avoid-tolls options
  - name: Google or Here geocoder selection
