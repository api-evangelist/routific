naftiko: 1.0.0-alpha2
info:
  label: Routific Route Optimization API — Jobs
  description: 'Routific Route Optimization API — Jobs. 1 operation covering asynchronous job status retrieval. Self-contained Naftiko capability for polling long-running VRP/PDP optimizations.'
  tags:
  - Routific
  - Jobs
  - Async
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ROUTIFIC_TOKEN: ROUTIFIC_TOKEN
capability:
  consumes:
  - type: http
    namespace: route-optimization-jobs
    baseUri: https://api.routific.com
    description: Routific Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs-job_id
      path: /jobs/{job_id}
      operations:
      - name: getjob
        method: GET
        description: Get the status and result of an asynchronous optimization job
        outputRawFormat: json
        outputParameters:
        - name: status
          type: string
          value: $.status
        - name: output
          type: object
          value: $.output
