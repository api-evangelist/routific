naftiko: 1.0.0-alpha2
info:
  label: Routific Route Optimization API — PDP
  description: 'Routific Route Optimization API — PDP. 2 operations covering asynchronous pickup-and-delivery solve and insert-into-existing-PDP-solution. Self-contained Naftiko capability covering the Pickup and Delivery Problem surface.'
  tags:
  - Routific
  - PDP
  - PickupAndDelivery
  - RouteOptimization
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ROUTIFIC_TOKEN: ROUTIFIC_TOKEN
capability:
  consumes:
  - type: http
    namespace: route-optimization-pdp
    baseUri: https://api.routific.com
    description: Routific PDP business capability. Self-contained, no shared references.
    resources:
    - name: v1-pdp-long
      path: /v1/pdp-long
      operations:
      - name: solvepdplong
        method: POST
        description: Solve Pickup-And-Delivery Problem asynchronously
        inputContentType: application/json
        outputRawFormat: json
        outputParameters:
        - name: job_id
          type: string
          value: $.job_id
    - name: v1-fix-pdp
      path: /v1/fix-pdp
      operations:
      - name: fixpdp
        method: POST
        description: Insert new pickup-and-delivery visits into an existing PDP solution
        inputContentType: application/json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
